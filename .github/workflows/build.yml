name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Pull Full ROCm Stack
        shell: pwsh
        run: |
          $base_url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1"
          $components = @(
            "rocm_sdk_core-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_devel-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_hip-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_hipblas-0.1.dev0-py3-none-win_amd64.whl"
          )
          
          mkdir D:/ROCm_Temp
          foreach ($c in $components) {
            Write-Host "Downloading $c..."
            Invoke-WebRequest -Uri "$base_url/$c" -OutFile "D:/ROCm_Temp/$c"
            Expand-Archive -Path "D:/ROCm_Temp/$c" -DestinationPath "D:/ROCm_Temp" -Force
          }
          
          # Find the compiler path
          $clangPath = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "clang.exe" -Recurse | Select-Object -First 1 -ExpandProperty DirectoryName
          
          # Set the Prefix Path to the root of the temp folder
          # CMake is smart enough to look through all subdirectories if we point to the parent
          echo "ROCM_BIN=$clangPath" >> $env:GITHUB_ENV
          echo "ROCM_PATH=D:/ROCm_Temp" >> $env:GITHUB_ENV
          
          Write-Host "Build Environment Ready."

      - name: Build SD.CPP
        shell: pwsh
        run: |
          $clang_exe = "${{ env.ROCM_BIN }}/clang.exe"
          $clangpp_exe = "${{ env.ROCM_BIN }}/clang++.exe"
          
          mkdir build; cd build
          # We point CMAKE_PREFIX_PATH to the whole extraction directory
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_PREFIX_PATH="${{ env.ROCM_PATH }}" `
            -DCMAKE_C_COMPILER="$clang_exe" `
            -DCMAKE_CXX_COMPILER="$clangpp_exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

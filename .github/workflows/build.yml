name: ROCm Build Farm
on: workflow_dispatch # This allows you to trigger it manually

jobs:
  build:
    runs-on: windows-2025 # Using the newest runner for a clean SDK
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Install HIP SDK
        shell: pwsh
        run: |
          # Use the 7.1.1 installer with silent flags
          curl -L -o hip_sdk.exe https://download.amd.com/developer/eula/rocm-hub/hip-sdk/7.1/amd-hip-sdk-7.1.1.exe
          Start-Process ./hip_sdk.exe -ArgumentList "-install", "-boot" -Wait

      - name: Build with CMake
        shell: pwsh
        run: |
          mkdir build; cd build
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_C_COMPILER="C:/Program Files/AMD/ROCm/7.1/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="C:/Program Files/AMD/ROCm/7.1/bin/clang++.exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

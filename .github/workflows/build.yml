name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022 # 2022 is slightly more stable for the current HIP installer
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Download HIP SDK
        shell: pwsh
        run: |
          # The -UserAgent is the key to bypassing the AMD "Direct Download" block
          Invoke-WebRequest -Uri "https://download.amd.com/developer/eula/rocm-hub/hip-sdk/7.1/amd-hip-sdk-7.1.1.exe" `
            -OutFile "hip_sdk.exe" `
            -UserAgent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          
          # Verify the file size (should be > 600MB)
          $size = (Get-Item hip_sdk.exe).Length / 1MB
          Write-Host "Downloaded file size: $size MB"
          if ($size -lt 100) { throw "Download failed - file too small!" }

      - name: Install HIP SDK (Silent)
        shell: pwsh
        run: |
          # -install -boot is the official silent command for the AMD installer
          Start-Process ./hip_sdk.exe -ArgumentList "-install", "-boot" -Wait
          
          # Give the system a second to register the paths
          Start-Sleep -Seconds 10

      - name: Build with CMake
        shell: pwsh
        run: |
          # Manually set the paths in case the installer didn't update the Global Path
          $env:PATH = "C:\Program Files\AMD\ROCm\7.1\bin;C:\Program Files\AMD\ROCm\7.1\lib;$env:PATH"
          
          mkdir build; cd build
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_C_COMPILER="C:/Program Files/AMD/ROCm/7.1/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="C:/Program Files/AMD/ROCm/7.1/bin/clang++.exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

# 1. Update the component list to match the ROCm 7.1.1 repo structure
$base_url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1"
$components = @(
    "rocm_sdk_core-0.1.dev0-py3-none-win_amd64.whl",
    "rocm_sdk_devel-0.1.dev0-py3-none-win_amd64.whl",
    "rocm_sdk_libraries_custom-0.1.dev0-py3-none-win_amd64.whl"
)

New-Item -ItemType Directory -Force -Path "D:/ROCm_Temp"

foreach ($c in $components) {
    Write-Host "Downloading $c..."
    Invoke-WebRequest -Uri "$base_url/$c" -OutFile "D:/ROCm_Temp/$c"
    Write-Host "Extracting $c..."
    # Rename to .zip for Expand-Archive compatibility
    Rename-Item -Path "D:/ROCm_Temp/$c" -NewName "temp.zip"
    Expand-Archive -Path "D:/ROCm_Temp/temp.zip" -DestinationPath "D:/ROCm_Temp" -Force
    Remove-Item "D:/ROCm_Temp/temp.zip"
}

# 2. Set essential Environment Variables
$ROCM_PATH = "D:/ROCm_Temp"
$env:HIP_PATH = $ROCM_PATH
$env:HIP_PLATFORM = "amd"  # Critical: Fixes the 'could not identify platform' bug in ROCm 7.x
$env:CMAKE_PREFIX_PATH = $ROCM_PATH

# 3. Locate the compiler (usually in the _rocm_sdk_core subfolder)
$compiler = Get-ChildItem -Path $ROCM_PATH -Filter "clang.exe" -Recurse | Select-Object -First 1
if ($compiler) {
    $env:CC = $compiler.FullName
    $env:CXX = ($compiler.FullName -replace "clang.exe", "clang++.exe")
    Write-Host "Compiler found at: $($env:CC)"
}

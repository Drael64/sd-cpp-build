name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Download HIP SDK
        shell: pwsh
        run: |
          # Mimic a real browser to bypass AMD's block
          $url = "https://download.amd.com/developer/eula/rocm-hub/hip-sdk/7.1/amd-hip-sdk-7.1.1.exe"
          $ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          Invoke-WebRequest -Uri $url -OutFile "hip_sdk.exe" -UserAgent $ua
          
          # Check if we actually got the file
          $file = Get-Item "hip_sdk.exe"
          $sizeMB = [math]::Round($file.Length / 1MB, 2)
          Write-Host "Downloaded file size: $sizeMB MB"
          
          if ($file.Length -lt 100MB) {
              Write-Error "Download failed! We only got a tiny file. AMD is blocking the request."
              exit 1
          }

      - name: Install HIP SDK
        shell: pwsh
        run: |
          # Silent install flags
          Start-Process ./hip_sdk.exe -ArgumentList "-install", "-boot" -Wait
          
          # Verify the compiler exists before moving on
          if (Test-Path "C:\Program Files\AMD\ROCm\7.1\bin\clang.exe") {
              Write-Host "HIP SDK installed successfully!"
          } else {
              Write-Error "HIP SDK files not found in C:\Program Files\AMD\ROCm\7.1\bin"
              exit 1
          }

      - name: Build SD.CPP
        shell: pwsh
        run: |
          # Point directly to the new tools
          $env:PATH = "C:\Program Files\AMD\ROCm\7.1\bin;$env:PATH"
          mkdir build; cd build
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_C_COMPILER="C:/Program Files/AMD/ROCm/7.1/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="C:/Program Files/AMD/ROCm/7.1/bin/clang++.exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-binaries
          path: build/bin/

name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Pull and Extract ROCm 7.1.1
        shell: pwsh
        run: |
          $base_url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1"
          $components = @(
            "rocm_sdk_core-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_devel-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_libraries_custom-0.1.dev0-py3-none-win_amd64.whl",
            "rocm-0.1.dev0.tar.gz"
          )
          
          mkdir D:/ROCm_Temp
          foreach ($c in $components) {
            Write-Host "Fetching $c..."
            curl.exe -L -o "D:/ROCm_Temp/$c" "$base_url/$c"
            & "C:\Program Files\7-Zip\7z.exe" x "D:/ROCm_Temp/$c" -o"D:/ROCm_Temp" -y | Out-Null
            Remove-Item "D:/ROCm_Temp/$c"
          }
          
          # Auto-detect the paths inside the extracted wheels
          $clang = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "clang.exe" -Recurse | Select-Object -First 1
          $hipDir = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "hip-config.cmake" -Recurse | Select-Object -First 1
          
          if ($clang) { 
            Write-Host "Found Compiler: $($clang.FullName)"
            echo "ROCM_BIN=$($clang.DirectoryName)" >> $env:GITHUB_ENV
          }
          
          # We provide multiple search paths to CMake just in case
          $searchPaths = @(
            "D:/ROCm_Temp",
            "D:/ROCm_Temp/_rocm_sdk_core",
            "D:/ROCm_Temp/_rocm_sdk_devel",
            "D:/ROCm_Temp/_rocm_sdk_libraries_custom"
          ) -join ";"
          
          echo "ROCM_SEARCH_PATHS=$searchPaths" >> $env:GITHUB_ENV
          Write-Host "Search Paths set for CMake."

      - name: Build SD.CPP
        shell: pwsh
        run: |
          $env:HIP_PLATFORM = "amd"
          $clang_exe = "${{ env.ROCM_BIN }}/clang.exe"
          $clangpp_exe = "${{ env.ROCM_BIN }}/clang++.exe"
          
          mkdir build; cd build
          # Pointing CMAKE_PREFIX_PATH to all possible subdirectories
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_PREFIX_PATH="${{ env.ROCM_SEARCH_PATHS }}" `
            -DCMAKE_C_COMPILER="$clang_exe" `
            -DCMAKE_CXX_COMPILER="$clangpp_exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

name: ROCm Build Farm
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Install Ninja and VC++ Redist
        shell: pwsh
        run: choco install ninja vcredist-all -y --no-progress

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download ROCm 6.4.2 from GDrive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --disable-pip-version-check --quiet gdown
          python -m gdown --fuzzy "https://drive.google.com/uc?id=1abKxjR4Teky3g4CkXGvaHVHalDgIsJSY" -O rocm-installer.exe
          if (!(Test-Path "rocm-installer.exe")) { throw "Download failed: rocm-installer.exe was not created" }
          $size = (Get-Item "rocm-installer.exe").Length
          Write-Host "Downloaded installer size: $([math]::Round($size / 1MB, 2)) MB"
          if ($size -lt 100MB) { throw "Download failed or file is suspiciously small" }

      - name: Install ROCm SDK
        timeout-minutes: 30
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Running silent install..."
          Start-Process -FilePath ".\rocm-installer.exe" -ArgumentList "-install","-log","C:\rocm-install.log" -Wait -NoNewWindow
          Write-Host "--- Install log tail ---"
          Get-Content "C:\rocm-install.log" -Tail 40 -ErrorAction SilentlyContinue
          $clang = Get-ChildItem "C:\Program Files\AMD\ROCm" -Recurse -Filter "clang.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$clang) {
            Write-Host "Contents of C:\Program Files\AMD:"
            Get-ChildItem "C:\Program Files\AMD" -Depth 3 -ErrorAction SilentlyContinue | Select-Object FullName
            throw "Clang not found after install"
          }
          Write-Host "Clang found at: $($clang.FullName)"
          $rocmRoot = Split-Path $clang.DirectoryName -Parent
          Write-Host "ROCm root detected at: $rocmRoot"
          $hipCfg = Get-ChildItem $rocmRoot -Recurse -Filter "hip-config.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$hipCfg) { throw "hip-config.cmake not found" }
          $hipblasCfg = Get-ChildItem $rocmRoot -Recurse -Filter "hipblas-config.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$hipblasCfg) { throw "hipblas-config.cmake not found" }
          echo "ROCM_ROOT=$rocmRoot" >> $env:GITHUB_ENV
          echo "ROCM_BIN_PATH=$($clang.DirectoryName -replace '\\','/')" >> $env:GITHUB_ENV
          echo "HIP_DIR_PATH=$($hipCfg.DirectoryName -replace '\\','/')" >> $env:GITHUB_ENV
          echo "HIPBLAS_DIR_PATH=$($hipblasCfg.DirectoryName -replace '\\','/')" >> $env:GITHUB_ENV

      - name: Apply community gfx1032 ROCm libraries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          $libUrl = "https://github.com/likelovewant/ROCmLibs-for-gfx1103-AMD780M-APU/releases/download/v0.6.4.2/rocm.gfx1032.for.hip.6.4.2.7z"
          $libArchive = "rocm-community-libs.7z"
          $extractDir = "community-libs"
          Write-Host "Downloading community rocblas libraries..."
          Invoke-WebRequest -Uri $libUrl -OutFile $libArchive -UseBasicParsing
          if (!(Test-Path $libArchive) -or (Get-Item $libArchive).Length -lt 1MB) { throw "Community library download failed or suspiciously small" }
          Write-Host "Downloaded: $([math]::Round((Get-Item $libArchive).Length / 1MB, 2)) MB"
          Write-Host "Extracting..."
          & $sevenZip x $libArchive -o"$extractDir" -y | Out-Null
          $binPath = "${{ env.ROCM_BIN_PATH }}"
          $libraryDest = "$binPath/rocblas/library"
          $rootDll = Get-ChildItem $extractDir -Recurse -Filter "rocblas.dll" | Where-Object { $_.DirectoryName -notlike "*library*" } | Select-Object -First 1
          if ($rootDll) {
            Write-Host "Copying rocblas.dll from $($rootDll.FullName) to $binPath"
            Copy-Item $rootDll.FullName "$binPath/rocblas.dll" -Force
          } else {
            throw "rocblas.dll not found anywhere in extracted archive"
          }
          $libSrc = Get-ChildItem $extractDir -Recurse -Directory -Filter "library" | Select-Object -First 1
          if ($libSrc) {
            if (!(Test-Path $libraryDest)) { New-Item -ItemType Directory -Path $libraryDest -Force | Out-Null }
            Write-Host "Copying library files from $($libSrc.FullName) to $libraryDest"
            Copy-Item "$($libSrc.FullName)\*" $libraryDest -Force -Recurse
          } else {
            throw "library subfolder not found anywhere in extracted archive"
          }
          Write-Host "Community libraries applied successfully"

      - name: Build SD.cpp
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:HIP_PLATFORM = "amd"
          $env:HIP_PATH = "${{ env.ROCM_ROOT }}"
          $env:ROCM_PATH = "${{ env.ROCM_ROOT }}"
          $bin = "${{ env.ROCM_BIN_PATH }}"
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
          cmake -S . -B build -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_C_COMPILER="$bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$bin/clang++.exe" `
            -DCMAKE_PREFIX_PATH="${{ env.ROCM_ROOT }}" `
            -Dhip_DIR="${{ env.HIP_DIR_PATH }}" `
            -Dhipblas_DIR="${{ env.HIPBLAS_DIR_PATH }}" `
            -DAMDGPU_TARGETS=gfx1032 `
            -DGPU_TARGETS=gfx1032
          cmake --build build --config Release -v

      - name: Copy logs for upload
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "C:\rocm-install.log") { Copy-Item "C:\rocm-install.log" ".\rocm-install.log" -Force }

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rocm-build-logs
          path: |
            rocm-install.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeCache.txt

      - name: Upload binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

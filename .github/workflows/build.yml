name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python requests
        run: python -m pip install requests

      - name: Download ROCm from GDrive
        shell: pwsh
        run: |
          $code = @"
          import requests
          import os
          def download():
              file_id = '14vPV_HnFMfEei0B1mhoyJDEgN6RksWEH'
              url = 'https://drive.google.com/uc?export=download'
              s = requests.Session()
              r = s.get(url, params={'id': file_id}, stream=True)
              token = None
              for k, v in r.cookies.items():
                  if k.startswith('download_warning'): token = v
              if token:
                  r = s.get(url, params={'id': file_id, 'confirm': token}, stream=True)
              with open('rocm-installer.exe', 'wb') as f:
                  for chunk in r.iter_content(32768):
                      if chunk: f.write(chunk)
          download()
          "@
          $code | Out-File -FilePath download_rocm.py -Encoding ascii
          python download_rocm.py

      - name: Extract ROCm SDK
        shell: pwsh
        run: |
          # Instead of running the installer, we extract the files we need.
          # This is 10x faster and won't hang the runner.
          mkdir D:/ROCm_SDK
          & "C:\Program Files\7-Zip\7z.exe" x rocm-installer.exe -o"D:/ROCm_SDK" -y | Out-Null
          
          # Deep search for the actual bin/lib folders inside the extracted installer
          $clang = Get-ChildItem "D:/ROCm_SDK" -Recurse -Filter "clang.exe" | Select-Object -First 1
          if (!$clang) { throw "Clang not found in extracted SDK!" }
          
          $hipDir = Get-ChildItem "D:/ROCm_SDK" -Recurse -Filter "hip-config.cmake" | Select-Object -First 1
          $hipblasDir = Get-ChildItem "D:/ROCm_SDK" -Recurse -Filter "hipblas-config.cmake" | Select-Object -First 1
          
          echo "ROCM_BIN_PATH=$($clang.DirectoryName)" >> $env:GITHUB_ENV
          echo "HIP_DIR_PATH=$($hipDir.DirectoryName.Replace('\', '/'))" >> $env:GITHUB_ENV
          echo "HIPBLAS_DIR_PATH=$($hipblasDir.DirectoryName.Replace('\', '/'))" >> $env:GITHUB_ENV
          Write-Host "Found Clang at: $($clang.FullName)"

      - name: Build SD.cpp
        shell: pwsh
        run: |
          $env:HSA_OVERRIDE_GFX_VERSION = "10.3.0"
          $env:HIP_PLATFORM = "amd"
          
          $bin = "${{ env.ROCM_BIN_PATH }}".Replace('\', '/')
          
          mkdir build; cd build
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_C_COMPILER="$bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$bin/clang++.exe" `
            -Dhip_DIR="${{ env.HIP_DIR_PATH }}" `
            -Dhipblas_DIR="${{ env.HIPBLAS_DIR_PATH }}" `
            -DGPU_TARGETS=gfx1030 `
            -DAMDGPU_TARGETS=gfx1030 `
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

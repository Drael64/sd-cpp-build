- name: Pull and Extract ROCm 7.1.1
        shell: pwsh
        run: |
          $base_url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1"
          $components = @(
            "rocm_sdk_core-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_devel-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_libraries_custom-0.1.dev0-py3-none-win_amd64.whl"
          )
          
          mkdir D:/ROCm_Temp
          foreach ($c in $components) {
            Write-Host "`n=== Fetching $c ==="
            curl.exe -L -o "D:/ROCm_Temp/$c" "$base_url/$c"
            
            Write-Host "=== Primary Extraction $c ==="
            & "C:\Program Files\7-Zip\7z.exe" x "D:/ROCm_Temp/$c" -o"D:/ROCm_Temp" -y | Out-Null
            Remove-Item "D:/ROCm_Temp/$c"
          }

          # NEW: Recursive extraction for the 'devel' content
          Write-Host "`n=== DEEP SEARCH: Extracting nested installers ==="
          $nested = Get-ChildItem -Path "D:/ROCm_Temp" -Include "*.msi","*.exe","*.cab" -Recurse
          foreach ($file in $nested) {
            Write-Host "Unpacking nested: $($file.Name)"
            & "C:\Program Files\7-Zip\7z.exe" x "$($file.FullName)" -o"D:/ROCm_Temp" -y | Out-Null
          }
          
          Write-Host "`n=== DETECTING ROCM ENVIRONMENT ==="
          
          # 1. Find Compiler
          $clang = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "clang.exe" -Recurse | Select-Object -First 1
          if ($clang) { 
            Write-Host "Compiler Found: $($clang.FullName)"
            echo "ROCM_BIN=$($clang.DirectoryName.Replace('\', '/'))" >> $env:GITHUB_ENV
          } else { Write-Host "CRITICAL: Clang compiler missing!" ; exit 1 }
          
          # 2. Find HIP Config
          # We'll search for the directory first to be safe
          $hipConfig = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "hip-config.cmake" -Recurse | Select-Object -First 1
          if ($hipConfig) {
            $hipDir = $hipConfig.DirectoryName.Replace('\', '/')
            Write-Host "HIP Config Directory: $hipDir"
            echo "HIP_DIR=$hipDir" >> $env:GITHUB_ENV
          } else {
            Write-Host "DUMPING FILE STRUCTURE (First 50 files) to see where we are:"
            Get-ChildItem -Path "D:/ROCm_Temp" -Recurse | Select-Object -First 50 FullName
            exit 1
          }

          # 3. Find HIPBLAS Config
          $hipblasConfig = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "hipblas-config.cmake" -Recurse | Select-Object -First 1
          if ($hipblasConfig) {
            $hipblasDir = $hipblasConfig.DirectoryName.Replace('\', '/')
            Write-Host "HIPBLAS Config Directory: $hipblasDir"
            echo "HIPBLAS_DIR=$hipblasDir" >> $env:GITHUB_ENV
          }

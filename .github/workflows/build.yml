name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Pull and Extract ROCm 7.1.1
        shell: pwsh
        run: |
          $base_url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1"
          $components = @(
            "rocm_sdk_core-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_devel-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_libraries_custom-0.1.dev0-py3-none-win_amd64.whl"
          )
          
          mkdir D:/ROCm_Temp
          foreach ($c in $components) {
            Write-Host "Downloading $c..."
            Invoke-WebRequest -Uri "$base_url/$c" -OutFile "D:/ROCm_Temp/$c"
            # Use 7-Zip to extract - it is much more reliable than Expand-Archive
            7z x "D:/ROCm_Temp/$c" -o"D:/ROCm_Temp" -y | Out-Null
          }
          
          # Debug: List top-level folders to verify extraction
          Write-Host "Extraction complete. Looking for files..."
          ls D:/ROCm_Temp -Recurse -Depth 2 | select Name, FullName

          # Find the compiler
          $clangPath = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "clang.exe" -Recurse | Select-Object -First 1 -ExpandProperty DirectoryName
          
          # Find the HIP Config
          $hipConfig = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "hip-config.cmake" -Recurse | Select-Object -First 1 -ExpandProperty DirectoryName
          
          if (-not $clangPath) { throw "Could not find clang.exe!" }
          if (-not $hipConfig) { 
             Write-Host "Warning: hip-config.cmake not found. Searching for any .cmake files..."
             Get-ChildItem -Path "D:/ROCm_Temp" -Filter "*.cmake" -Recurse | Select-Object -First 5 -ExpandProperty FullName
             throw "Critical ROCm config files missing!" 
          }
          
          echo "ROCM_BIN=$clangPath" >> $env:GITHUB_ENV
          echo "ROCM_PATH=D:/ROCm_Temp" >> $env:GITHUB_ENV
          Write-Host "Success: Compiler found at $clangPath"

      - name: Build SD.CPP
        shell: pwsh
        run: |
          $env:HIP_PLATFORM = "amd"
          $clang_exe = "${{ env.ROCM_BIN }}/clang.exe"
          $clangpp_exe = "${{ env.ROCM_BIN }}/clang++.exe"
          
          mkdir build; cd build
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_PREFIX_PATH="${{ env.ROCM_PATH }}" `
            -DCMAKE_C_COMPILER="$clang_exe" `
            -DCMAKE_CXX_COMPILER="$clangpp_exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

name: ROCm Build Farm

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      # Checkout stable-diffusion.cpp
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      # Install Ninja build system
      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y

      # Load MSVC environment (ROCm clang depends on this!)
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # Ensure Python requests is available
      - name: Install Python requests
        shell: pwsh
        run: python -m pip install requests

      # Prepare temp directory
      - name: Prepare temp folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path C:\Temp | Out-Null

      # Download ROCm installer from Google Drive (handles virus warning)
      - name: Download ROCm installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          @'
import requests

file_id = "14vPV_HnFMfEei0B1mhoyJDEgN6RksWEH"
url = "https://drive.google.com/uc?export=download"

session = requests.Session()
response = session.get(url, params={"id": file_id}, stream=True)

token = None
for k, v in response.cookies.items():
    if k.startswith("download_warning"):
        token = v

if token:
    response = session.get(url, params={"id": file_id, "confirm": token}, stream=True)

with open(r"C:\Temp\rocm-installer.exe", "wb") as f:
    for chunk in response.iter_content(32768):
        if chunk:
            f.write(chunk)

print("ROCm installer downloaded")
'@ | python -

      # Verify installer size (must be large!)
      - name: Verify installer
        shell: pwsh
        run: |
          $size = (Get-Item C:\Temp\rocm-installer.exe).Length
          Write-Host "Installer size: $size bytes"
          if ($size -lt 1000000000) { throw "Installer download failed!" }

      # Install ROCm HIP SDK silently (SDK only, no drivers)
      - name: Install ROCm HIP SDK
        shell: pwsh
        run: |
          Start-Process -FilePath "C:\Temp\rocm-installer.exe" `
            -ArgumentList "-install","-quiet","-norestart","-install_sdk","-log","C:\Temp\rocm-install.log" `
            -Wait -NoNewWindow

      # Detect ROCm toolchain paths automatically
      - name: Detect ROCm paths
        shell: pwsh
        run: |
          $clang = Get-ChildItem "C:\Program Files\AMD\ROCm" -Recurse -Filter clang.exe | Select-Object -First 1
          $hip = Get-ChildItem "C:\Program Files\AMD\ROCm" -Recurse -Filter hip-config.cmake | Select-Object -First 1
          $hipblas = Get-ChildItem "C:\Program Files\AMD\ROCm" -Recurse -Filter hipblas-config.cmake | Select-Object -First 1

          if (!$clang) { throw "clang not found" }
          if (!$hip) { throw "hip not found" }
          if (!$hipblas) { throw "hipblas not found" }

          echo "ROCM_CLANG=$($clang.DirectoryName)" >> $env:GITHUB_ENV
          echo "HIP_DIR=$($hip.DirectoryName)" >> $env:GITHUB_ENV
          echo "HIPBLAS_DIR=$($hipblas.DirectoryName)" >> $env:GITHUB_ENV

      # Build stable-diffusion.cpp with HIPBLAS for RX 6600M (gfx1030)
      - name: Build SD.cpp HIPBLAS
        shell: pwsh
        run: |
          $env:HSA_OVERRIDE_GFX_VERSION="10.3.0"
          $env:HIP_PLATFORM="amd"

          $clang="$env:ROCM_CLANG\clang.exe"
          $clangxx="$env:ROCM_CLANG\clang++.exe"

          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_C_COMPILER="$clang" `
            -DCMAKE_CXX_COMPILER="$clangxx" `
            -DHIP_DIR="$env:HIP_DIR" `
            -DHIPBLAS_DIR="$env:HIPBLAS_DIR" `
            -DGPU_TARGETS=gfx1030 `
            -DAMDGPU_TARGETS=gfx1030 `
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

          cmake --build build --config Release

      # Upload compiled binaries
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: build/bin/*

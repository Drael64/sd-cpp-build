name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Pull and Extract ROCm 7.1.1
        shell: pwsh
        run: |
          $base_url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1"
          $components = @(
            "rocm_sdk_core-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_devel-0.1.dev0-py3-none-win_amd64.whl",
            "rocm_sdk_libraries_custom-0.1.dev0-py3-none-win_amd64.whl"
          )
          
          if (!(Test-Path "D:/ROCm_Temp")) { New-Item -ItemType Directory -Path "D:/ROCm_Temp" }

          foreach ($c in $components) {
            Write-Host "--- Starting: $c ---"
            
            # Use curl.exe with -L (follow redirects) and -f (fail on 404)
            curl.exe -L -f -o "D:/ROCm_Temp/$c" "$base_url/$c"
            
            if ($LASTEXITCODE -ne 0) { throw "Download failed for $c. AMD server might be down or URL changed." }
            
            Write-Host "Extracting $c..."
            # Using the full path to 7z just to be safe
            & "C:\Program Files\7-Zip\7z.exe" x "D:/ROCm_Temp/$c" -o"D:/ROCm_Temp" -y | Out-Null
            
            if ($LASTEXITCODE -ne 0) { throw "Extraction failed for $c." }
            
            Remove-Item "D:/ROCm_Temp/$c" # Clean up to save space
            Write-Host "Done with $c"
          }

          # FIND THE COMPILER
          $clang = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "clang.exe" -Recurse | Select-Object -First 1
          $hip = Get-ChildItem -Path "D:/ROCm_Temp" -Filter "hip-config.cmake" -Recurse | Select-Object -First 1
          
          if (!$clang) { throw "Clang.exe not found anywhere in D:/ROCm_Temp!" }
          if (!$hip) { throw "hip-config.cmake not found! Math libraries didn't extract correctly." }

          echo "ROCM_BIN=$($clang.DirectoryName)" >> $env:GITHUB_ENV
          echo "ROCM_PATH=D:/ROCm_Temp" >> $env:GITHUB_ENV
          Write-Host "Success: Build environment verified."

      - name: Build SD.CPP
        shell: pwsh
        run: |
          $env:HIP_PLATFORM = "amd"
          $clang_exe = "${{ env.ROCM_BIN }}/clang.exe"
          $clangpp_exe = "${{ env.ROCM_BIN }}/clang++.exe"
          
          mkdir build; cd build
          cmake .. -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_HIPBLAS=ON `
            -DCMAKE_PREFIX_PATH="${{ env.ROCM_PATH }}" `
            -DCMAKE_C_COMPILER="$clang_exe" `
            -DCMAKE_CXX_COMPILER="$clangpp_exe" `
            -DGPU_TARGETS="gfx1030"
          ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: |
            build/bin/*.exe
            build/bin/*.dll

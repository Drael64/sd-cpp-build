name: ROCm Build Farm
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      # 1️⃣ Install Ninja (missing!)
      - name: Install Ninja
        run: choco install ninja -y

      # 2️⃣ Load MSVC environment (CRITICAL)
      - name: Setup MSVC env
        uses: ilammy/msvc-dev-cmd@v1

      # 3️⃣ Fetch ROCm Windows SDK
      - name: Install ROCm SDK
        shell: pwsh
        run: |
          $url = "https://repo.radeon.com/rocm/windows/rocm-rel-7.1.1/ROCm-Windows-Installer.exe"
          curl.exe -L -o rocm.exe $url
          Start-Process -FilePath ".\rocm.exe" -ArgumentList "-install","-quiet" -Wait

      # 4️⃣ Setup ROCm environment variables
      - name: Setup ROCm ENV
        shell: pwsh
        run: |
          echo "HIP_PATH=C:/Program Files/AMD/ROCm/5.7" >> $env:GITHUB_ENV
          echo "ROCM_PATH=C:/Program Files/AMD/ROCm/5.7" >> $env:GITHUB_ENV
          echo "PATH=C:/Program Files/AMD/ROCm/5.7/bin;$env:PATH" >> $env:GITHUB_ENV
          echo "HSA_OVERRIDE_GFX_VERSION=10.3.0" >> $env:GITHUB_ENV
          echo "HIP_PLATFORM=amd" >> $env:GITHUB_ENV

      # 5️⃣ Configure + Build
      - name: Build SD.cpp HIPBLAS
        shell: pwsh
        run: |
          mkdir build
          cd build

          cmake .. -G Ninja `
            -DSD_HIPBLAS=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DAMDGPU_TARGETS=gfx1030 `
            -DGPU_TARGETS=gfx1030 `
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

          ninja

      - uses: actions/upload-artifact@v4
        with:
          name: sd-cpp-rocm-binaries
          path: build/bin/*
